<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop – Enzo's Art Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #fff9f0;
      font-family: 'Nunito', sans-serif;
    }

    header {
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #a29bfe);
      background-size: 300% 300%;
      animation: gradientShift 8s ease infinite;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      flex-wrap: wrap;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .back-btn {
      background: white;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      color: #ff6b6b;
      text-decoration: none;
      transition: transform 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { transform: scale(1.07); }

    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      flex: 1;
    }

    /* Language switcher */
    .lang-switcher {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .lang-btn {
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 6px 14px;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.4); }
    .lang-btn.active {
      background: white;
      color: #ff6b6b;
      border-color: white;
    }

    .search-wrap {
      max-width: 700px;
      margin: 36px auto 0;
      padding: 0 20px;
    }
    .search-wrap input {
      width: 100%;
      padding: 16px 24px;
      border-radius: 50px;
      border: 3px solid #feca57;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      outline: none;
      box-shadow: 0 4px 15px rgba(254,202,87,0.3);
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #ff6b6b; }

    .section-label {
      max-width: 960px;
      margin: 30px auto 16px;
      padding: 0 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      color: #444;
    }

    .grid {
      max-width: 960px;
      margin: 0 auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 28px;
    }

    .card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 3px solid transparent;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 14px 35px rgba(0,0,0,0.13);
      border-color: #feca57;
    }

    .card-img-wrap {
      width: 100%;
      background: #f8f8f8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .card-body { padding: 16px 18px 20px; }
    .card-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      color: #333;
      margin-bottom: 6px;
    }
    .card-price {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: #ff6b6b;
      margin-bottom: 14px;
    }
    .card-btn {
      display: block;
      background: linear-gradient(135deg, #a29bfe, #ff9ff3);
      border: none;
      border-radius: 50px;
      padding: 10px 0;
      width: 100%;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .card-btn:hover { opacity: 0.85; }

    .empty-state {
      max-width: 960px;
      margin: 80px auto;
      text-align: center;
      padding: 0 20px;
    }
    .empty-state .icon { font-size: 5rem; margin-bottom: 16px; }
    .empty-state h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: #ccc;
      margin-bottom: 8px;
    }
    .empty-state p { color: #aaa; font-size: 1rem; }

    .no-results {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: #bbb;
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 32px;
      width: 100%;
      max-width: 92vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-img-wrap {
      width: 100%;
      background: #f8f8f8;
      border-radius: 32px 32px 0 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .modal-body { padding: 24px 28px 32px; }
    .modal-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: #333;
      margin-bottom: 8px;
    }
    .modal-price {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: #ff6b6b;
      margin-bottom: 22px;
    }
    .modal-actions { display: flex; gap: 12px; }
    .btn-buy {
      flex: 1;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      border: none;
      border-radius: 50px;
      padding: 15px;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      cursor: pointer;
      transition: transform 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-buy:hover { transform: scale(1.04); }
    .btn-close {
      background: #f0f0f0;
      border: none;
      border-radius: 50px;
      padding: 15px 22px;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      color: #888;
    }
    .btn-close:hover { background: #e0e0e0; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-btn" id="backBtn">← Back</a>
    <h1>🎨 Enzo's Art Shop</h1>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">🇺🇸 EN</button>
      <button class="lang-btn" onclick="setLang('fr')">🇫🇷 FR</button>
      <button class="lang-btn" onclick="setLang('zh')">🇨🇳 中文</button>
      <button class="lang-btn" onclick="setLang('es')">🇲🇽 ES</button>
    </div>
  </header>

  <div class="search-wrap">
    <input id="searchInput" type="text" oninput="renderGrid()" />
  </div>

  <p class="section-label" id="sectionLabel"></p>
  <div class="grid" id="grid"></div>
  <p class="no-results" id="noResults" style="display:none"></p>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🖌️</div>
    <h2 id="emptyTitle"></h2>
    <p id="emptyMsg"></p>
  </div>

  <!-- Modal -->
  <div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-img-wrap">
        <img class="modal-img" id="modalImg" src="" alt="" />
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-price" id="modalPrice"></p>
        <div class="modal-actions">
          <a class="btn-buy" id="buyBtn" href="#" target="_blank"></a>
          <button class="btn-close" id="closeBtn" onclick="closeModal()"></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const FORMS = {
      en: 'https://docs.google.com/forms/d/e/1FAIpQLSczLLXL-TRcpHkDp3pRfTcSMwPm9105_jGO2wIuJe7aEOq3tQ/viewform',
      es: 'https://docs.google.com/forms/d/e/1FAIpQLSeDl-AhzLgM4HC3dbt7rZM2MAwVUQs4EboG3Yn8ePII7nfwXg/viewform',
      fr: 'https://docs.google.com/forms/d/e/1FAIpQLSfytVtDMpuq-A5RgROXqpzE2B4bse8-ZqHPhSrjOobjI72CTg/viewform',
      zh: 'https://docs.google.com/forms/d/e/1FAIpQLSfF8byNHmKnbwJhykZdtZqEfVwFtW4GH4tnSw2HuzJbppLSKg/viewform',
    };

    const TEXT = {
      en: {
        search: 'Search for art... 🔍',
        allArtworks: count => `All Artworks ✨ (${count})`,
        results: (n, q) => `${n} result${n !== 1 ? 's' : ''} for "${q}" ✨`,
        noResults: 'No art found! Try a different search 🎭',
        emptyTitle: 'No art yet!',
        emptyMsg: 'Check back soon — Enzo is painting!',
        previewBtn: '👀 Preview & Buy',
        buyBtn: '🛒 I Want This!',
        closeBtn: 'Close',
      },
      fr: {
        search: 'Rechercher de l\'art... 🔍',
        allArtworks: count => `Toutes les œuvres ✨ (${count})`,
        results: (n, q) => `${n} résultat${n !== 1 ? 's' : ''} pour "${q}" ✨`,
        noResults: 'Aucune œuvre trouvée ! Essayez une autre recherche 🎭',
        emptyTitle: 'Pas encore d\'art !',
        emptyMsg: 'Revenez bientôt — Enzo est en train de peindre !',
        previewBtn: '👀 Aperçu & Acheter',
        buyBtn: '🛒 Je veux ça !',
        closeBtn: 'Fermer',
      },
      zh: {
        search: '搜索艺术品... 🔍',
        allArtworks: count => `所有艺术品 ✨ (${count})`,
        results: (n, q) => `"${q}" 的 ${n} 个结果 ✨`,
        noResults: '没有找到艺术品！试试其他搜索 🎭',
        emptyTitle: '还没有艺术品！',
        emptyMsg: '请稍后再来 — 恩佐正在画画！',
        previewBtn: '👀 预览 & 购买',
        buyBtn: '🛒 我想要这个！',
        closeBtn: '关闭',
      },
      es: {
        search: 'Buscar arte... 🔍',
        allArtworks: count => `Todas las obras ✨ (${count})`,
        results: (n, q) => `${n} resultado${n !== 1 ? 's' : ''} para "${q}" ✨`,
        noResults: '¡No se encontró arte! Intenta otra búsqueda 🎭',
        emptyTitle: '¡Aún no hay arte!',
        emptyMsg: 'Vuelve pronto — ¡Enzo está pintando!',
        previewBtn: '👀 Ver y Comprar',
        buyBtn: '🛒 ¡Lo quiero!',
        closeBtn: 'Cerrar',
      },
    };

    let currentLang = 'en';
    let allArtworks = [];

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      applyText();
      renderGrid();
    }

    function applyText() {
      const t = TEXT[currentLang];
      document.getElementById('searchInput').placeholder = t.search;
      document.getElementById('noResults').textContent = t.noResults;
      document.getElementById('emptyTitle').textContent = t.emptyTitle;
      document.getElementById('emptyMsg').textContent = t.emptyMsg;
      document.getElementById('closeBtn').textContent = t.closeBtn;
      document.getElementById('buyBtn').textContent = t.buyBtn;
    }

    async function loadArtworks() {
      try {
        const res = await fetch('data.json?nocache=' + Date.now());
        allArtworks = await res.json();
      } catch(e) {
        allArtworks = [];
      }
      applyText();
      renderGrid();
    }

    function renderGrid() {
      const t = TEXT[currentLang];
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const grid = document.getElementById('grid');
      const noResults = document.getElementById('noResults');
      const emptyState = document.getElementById('emptyState');
      const label = document.getElementById('sectionLabel');

      grid.innerHTML = '';

      if (allArtworks.length === 0) {
        emptyState.style.display = 'block';
        label.style.display = 'none';
        noResults.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';

      const filtered = allArtworks.filter(a =>
        !query || a.name.toLowerCase().includes(query)
      );

      if (filtered.length === 0) {
        noResults.style.display = 'block';
        label.style.display = 'none';
      } else {
        noResults.style.display = 'none';
        label.style.display = 'block';
        label.textContent = query
          ? t.results(filtered.length, query)
          : t.allArtworks(filtered.length);
      }

      filtered.forEach(art => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-img-wrap">
            <img class="card-img" src="${art.image}" alt="${art.name}" loading="lazy" />
          </div>
          <div class="card-body">
            <p class="card-title">${art.name}</p>
            <p class="card-price">$${art.price}</p>
            <button class="card-btn" onclick="openModal('${art.id}')">${t.previewBtn}</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function openModal(id) {
      const art = allArtworks.find(a => a.id === id);
      if (!art) return;
      const t = TEXT[currentLang];
      document.getElementById('modalImg').src = art.image;
      document.getElementById('modalImg').alt = art.name;
      document.getElementById('modalTitle').textContent = art.name;
      document.getElementById('modalPrice').textContent = '$' + art.price;
      document.getElementById('buyBtn').textContent = t.buyBtn;
      document.getElementById('buyBtn').href = FORMS[currentLang];
      document.getElementById('closeBtn').textContent = t.closeBtn;
      document.getElementById('overlay').classList.add('open');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('overlay')) {
        document.getElementById('overlay').classList.remove('open');
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    loadArtworks();
  </script>
</body>
</html>
