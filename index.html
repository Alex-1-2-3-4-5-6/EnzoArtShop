<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enzo's Art Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9ff3, #feca57, #48dbfb, #ff6b6b, #a29bfe);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating shapes background */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.3; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }

    .card {
      background: white;
      border-radius: 40px;
      padding: 60px 70px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      position: relative;
      z-index: 10;
      max-width: 600px;
      width: 90%;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .palette-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s ease infinite;
    }
    .dot:nth-child(1) { background:#ff6b6b; animation-delay: 0s; }
    .dot:nth-child(2) { background:#feca57; animation-delay: 0.15s; }
    .dot:nth-child(3) { background:#48dbfb; animation-delay: 0.3s; }
    .dot:nth-child(4) { background:#ff9ff3; animation-delay: 0.45s; }
    .dot:nth-child(5) { background:#a29bfe; animation-delay: 0.6s; }
    .dot:nth-child(6) { background:#55efc4; animation-delay: 0.75s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: 1.15;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #a29bfe, #ff9ff3);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes shimmer {
      0%   { background-position: 0% }
      100% { background-position: 200% }
    }

    .subtitle {
      font-size: 1.1rem;
      color: #888;
      font-weight: 700;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .emoji-row {
      font-size: 2rem;
      margin-bottom: 32px;
      letter-spacing: 6px;
    }

    .shop-btn {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      padding: 18px 50px;
      border-radius: 60px;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(255,107,107,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
    }

    .shop-btn:hover {
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 14px 35px rgba(255,107,107,0.5);
    }

    .shop-btn:active {
      transform: scale(0.97);
    }

    .stars {
      margin-top: 28px;
      font-size: 1.3rem;
      color: #feca57;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

  <!-- Floating background shapes -->
  <script>
    const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#a29bfe','#55efc4'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'shape';
      const size = Math.random() * 70 + 20;
      el.style.cssText = `
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        left:${Math.random()*100}vw;
        bottom:-${size}px;
        animation-duration:${Math.random()*8+6}s;
        animation-delay:${Math.random()*8}s;
        border-radius:${Math.random() > 0.5 ? '50%' : '20%'};
      `;
      document.body.appendChild(el);
    }
  </script>

  <div class="card">
    <div class="palette-row">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <h1 class="title">Enzo's<br>Art Shop 🎨</h1>
    <p class="subtitle">Colorful art made with love!</p>

    <div class="emoji-row">🖌️ 🖍️ ✏️ 🎭 🌈</div>

    <a href="shop.html" class="shop-btn">Go to Shop →</a>

    <div class="stars">★ ★ ★ ★ ★</div>
  </div>

</body>
</html>
