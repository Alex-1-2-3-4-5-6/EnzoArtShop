<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Enzo's Art Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f7f7f7;
      font-family: 'Nunito', sans-serif;
    }

    header {
      background: #333;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: white;
    }
    .back-btn {
      background: #555;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      cursor: pointer;
      color: white;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #777; }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    /* Upload form */
    .upload-card {
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 40px;
    }
    .upload-card h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 24px;
    }

    .drop-zone {
      border: 3px dashed #feca57;
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 20px;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragging {
      background: #fffbf0;
      border-color: #ff6b6b;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-zone .icon { font-size: 3rem; margin-bottom: 10px; }
    .drop-zone p {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: #aaa;
    }
    .drop-zone p span { color: #ff6b6b; }

    #previewImg {
      display: none;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 2px solid #eee;
    }

    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    .field input {
      width: 100%;
      padding: 13px 18px;
      border: 2.5px solid #e0e0e0;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #feca57; }

    .add-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      border: none;
      border-radius: 50px;
      padding: 16px;
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .add-btn:hover { transform: scale(1.02); }
    .add-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .success-msg {
      display: none;
      background: #d4edda;
      color: #155724;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
      margin-top: 14px;
      text-align: center;
    }

    /* Art list */
    .list-header {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      color: #444;
      margin-bottom: 16px;
    }

    .art-item {
      background: white;
      border-radius: 20px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.07);
      margin-bottom: 14px;
    }
    .art-item img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .art-info { flex: 1; min-width: 0; }
    .art-info .name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .art-info .price {
      font-weight: 700;
      color: #ff6b6b;
      font-size: 0.95rem;
    }
    .delete-btn {
      background: #fff0f0;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      color: #ff6b6b;
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .delete-btn:hover { background: #ffd6d6; }

    .empty-list {
      text-align: center;
      padding: 40px 0;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: #ccc;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-btn">← Shop</a>
    <h1>🔧 Admin Panel</h1>
  </header>

  <div class="container">

    <!-- Upload form -->
    <div class="upload-card">
      <h2>➕ Add New Artwork</h2>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" />
        <div class="icon">🖼️</div>
        <p><span>Click to upload</span> or drag a photo here</p>
      </div>

      <img id="previewImg" src="" alt="preview" />

      <div class="field">
        <label>Art Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Rainbow Sunset" />
      </div>

      <div class="field">
        <label>Price (USD)</label>
        <input type="number" id="priceInput" placeholder="e.g. 10" min="0" step="0.01" />
      </div>

      <button class="add-btn" id="addBtn" onclick="addArtwork()" disabled>Add to Shop</button>
      <div class="success-msg" id="successMsg">✅ Artwork added to the shop!</div>
    </div>

    <!-- Existing art list -->
    <p class="list-header">🎨 Your Artworks</p>
    <div id="artList"></div>

  </div>

  <script>
    let selectedImageData = null;

    // Drag-and-drop styling
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        selectedImageData = e.target.result;
        const preview = document.getElementById('previewImg');
        preview.src = selectedImageData;
        preview.style.display = 'block';
        checkReady();
      };
      reader.readAsDataURL(file);
    }

    function checkReady() {
      const name = document.getElementById('nameInput').value.trim();
      const price = document.getElementById('priceInput').value.trim();
      document.getElementById('addBtn').disabled = !(selectedImageData && name && price);
    }

    document.getElementById('nameInput').addEventListener('input', checkReady);
    document.getElementById('priceInput').addEventListener('input', checkReady);

    function getArtworks() {
      return JSON.parse(localStorage.getItem('enzoArtworks') || '[]');
    }
    function saveArtworks(list) {
      localStorage.setItem('enzoArtworks', JSON.stringify(list));
    }

    function addArtwork() {
      const name = document.getElementById('nameInput').value.trim();
      const price = parseFloat(document.getElementById('priceInput').value).toFixed(2);
      const artworks = getArtworks();

      artworks.unshift({
        id: Date.now().toString(),
        name,
        price,
        image: selectedImageData,
      });

      saveArtworks(artworks);

      // Reset form
      selectedImageData = null;
      document.getElementById('nameInput').value = '';
      document.getElementById('priceInput').value = '';
      document.getElementById('previewImg').style.display = 'none';
      document.getElementById('fileInput').value = '';
      document.getElementById('addBtn').disabled = true;

      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);

      renderList();
    }

    function deleteArtwork(id) {
      if (!confirm('Delete this artwork?')) return;
      saveArtworks(getArtworks().filter(a => a.id !== id));
      renderList();
    }

    function renderList() {
      const artworks = getArtworks();
      const list = document.getElementById('artList');
      list.innerHTML = '';

      if (artworks.length === 0) {
        list.innerHTML = '<p class="empty-list">No artworks yet — add one above!</p>';
        return;
      }

      artworks.forEach(art => {
        const item = document.createElement('div');
        item.className = 'art-item';
        item.innerHTML = `
          <img src="${art.image}" alt="${art.name}" />
          <div class="art-info">
            <p class="name">${art.name}</p>
            <p class="price">$${art.price}</p>
          </div>
          <button class="delete-btn" onclick="deleteArtwork('${art.id}')">🗑️ Delete</button>
        `;
        list.appendChild(item);
      });
    }

    renderList();
  </script>
</body>
</html>
