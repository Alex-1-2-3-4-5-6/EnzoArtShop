<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Enzo's Art Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #f4f4f4; font-family: 'Nunito', sans-serif; }

    /* ── Token gate ── */
    .gate {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
      background: linear-gradient(135deg, #2d2d2d, #444);
    }
    .gate-card {
      background: white; border-radius: 28px; padding: 40px 36px;
      max-width: 440px; width: 100%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .gate-card .icon { font-size: 3rem; margin-bottom: 12px; }
    .gate-card h2 { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: #333; margin-bottom: 6px; }
    .gate-card p { color: #888; font-size: 0.95rem; margin-bottom: 24px; }
    .gate-card input {
      width: 100%; padding: 14px 18px; border: 2.5px solid #e0e0e0;
      border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 1rem;
      outline: none; margin-bottom: 14px; transition: border-color 0.2s;
    }
    .gate-card input:focus { border-color: #feca57; }
    .gate-btn {
      width: 100%; background: linear-gradient(135deg, #ff6b6b, #feca57);
      border: none; border-radius: 50px; padding: 14px;
      color: white; font-family: 'Fredoka One', cursive; font-size: 1.1rem;
      cursor: pointer; transition: transform 0.2s;
    }
    .gate-btn:hover { transform: scale(1.02); }
    .gate-error { color: #e74c3c; font-size: 0.9rem; font-weight: 700; margin-top: 10px; display: none; }

    /* ── Main app ── */
    #app { display: none; }

    header {
      background: #2d2d2d; padding: 16px 28px;
      display: flex; align-items: center; gap: 14px;
    }
    header h1 { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; flex: 1; }
    .header-status {
      font-size: 0.85rem; color: #aaa; font-weight: 700;
      background: #444; padding: 6px 14px; border-radius: 50px;
    }
    .logout-btn {
      background: #444; border: none; border-radius: 50px;
      padding: 7px 16px; color: #ccc; font-family: 'Fredoka One', cursive;
      font-size: 0.85rem; cursor: pointer;
    }
    .logout-btn:hover { background: #666; }

    .container { max-width: 820px; margin: 36px auto; padding: 0 20px 80px; }

    .panel {
      background: white; border-radius: 24px; padding: 28px 30px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.07); margin-bottom: 28px;
    }
    .panel h2 {
      font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: #333;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }

    /* Upload zone */
    .drop-zone {
      border: 3px dashed #feca57; border-radius: 16px; padding: 28px 20px;
      text-align: center; cursor: pointer; transition: background 0.2s;
      margin-bottom: 16px; position: relative;
    }
    .drop-zone:hover { background: #fffbf0; }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .dz-icon { font-size: 2.2rem; margin-bottom: 6px; }
    .drop-zone p { font-family: 'Fredoka One', cursive; font-size: 1rem; color: #bbb; }
    .drop-zone p span { color: #ff6b6b; }

    #imgPreview {
      display: none; width: 100%; max-height: 200px;
      object-fit: contain; border-radius: 12px;
      border: 2px solid #eee; margin-bottom: 14px; background: #fafafa;
    }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-weight: 700; color: #555; margin-bottom: 6px; font-size: 0.9rem; }
    .field input {
      width: 100%; padding: 12px 16px; border: 2.5px solid #e0e0e0;
      border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #feca57; }
    .field .hint { font-size: 0.78rem; color: #bbb; margin-top: 4px; }

    .primary-btn {
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      border: none; border-radius: 50px; padding: 13px 28px;
      color: white; font-family: 'Fredoka One', cursive; font-size: 1.05rem;
      cursor: pointer; transition: transform 0.2s, opacity 0.2s;
    }
    .primary-btn:hover { transform: scale(1.03); }
    .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .status-msg {
      margin-top: 14px; padding: 12px 16px; border-radius: 12px;
      font-weight: 700; font-size: 0.9rem; display: none;
    }
    .status-msg.success { background: #d4edda; color: #155724; }
    .status-msg.error   { background: #f8d7da; color: #721c24; }
    .status-msg.loading { background: #fff3cd; color: #856404; }

    /* Art list */
    .art-item {
      background: #fafafa; border-radius: 16px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 12px; border: 2px solid #eee;
    }
    .art-item img {
      width: 68px; height: 68px; object-fit: cover;
      border-radius: 10px; flex-shrink: 0; background: #eee;
    }
    .art-item-info { flex: 1; min-width: 0; }
    .art-item-name { font-family: 'Fredoka One', cursive; font-size: 1rem; color: #333; }
    .art-item-meta { font-size: 0.82rem; color: #aaa; margin-top: 2px; }
    .delete-btn {
      background: #fff0f0; border: none; border-radius: 50px;
      padding: 8px 16px; color: #ff6b6b; font-family: 'Fredoka One', cursive;
      font-size: 0.88rem; cursor: pointer; flex-shrink: 0; transition: background 0.2s;
    }
    .delete-btn:hover { background: #ffd6d6; }
    .delete-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-list { text-align: center; padding: 28px 0; font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: #ccc; }

    .progress-bar {
      height: 6px; background: #eee; border-radius: 3px;
      margin-top: 10px; display: none; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #ff6b6b, #feca57);
      border-radius: 3px; transition: width 0.3s; width: 0%;
    }
  </style>
</head>
<body>

  <!-- Token gate -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <div class="icon">🎨</div>
      <h2>Admin Access</h2>
      <p>Enter the PIN to manage Enzo's Art Shop.</p>
      <input type="password" id="pinInput" placeholder="Enter PIN..." onkeydown="if(event.key==='Enter') login()" />
      <button class="gate-btn" onclick="login()">Enter Admin</button>
      <p class="gate-error" id="gateError"></p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app">
    <header>
      <h1>🔧 Enzo's Art Shop — Admin</h1>
      <span class="header-status" id="headerStatus"></span>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </header>

    <div class="container">

      <!-- Add artwork -->
      <div class="panel">
        <h2>➕ Add New Artwork</h2>

        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" />
          <div class="dz-icon">🖼️</div>
          <p><span>Click or drag</span> a photo here</p>
        </div>
        <img id="imgPreview" src="" alt="preview" />

        <div class="field">
          <label>Art Name</label>
          <input type="text" id="nameInput" placeholder="e.g. Fort Pigs" oninput="checkReady()" />
        </div>
        <div class="field">
          <label>Price (USD)</label>
          <input type="number" id="priceInput" placeholder="e.g. 3.50" min="0" step="0.01" oninput="checkReady()" />
        </div>
        <div class="field">
          <label>Image Filename</label>
          <input type="text" id="filenameInput" placeholder="e.g. FortPigs.jpg" oninput="checkReady()" />
          <p class="hint">Auto-filled from your photo. Keep it as-is.</p>
        </div>

        <button class="primary-btn" id="addBtn" onclick="addArtwork()" disabled>Upload & Add to Shop</button>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-msg" id="addStatus"></div>
      </div>

      <!-- Existing artworks -->
      <div class="panel">
        <h2>🎨 Current Artworks</h2>
        <div id="artList"><p class="empty-list">Loading...</p></div>
        <div class="status-msg" id="deleteStatus"></div>
      </div>

    </div>
  </div>

  <script>
    const OWNER     = 'Alex-1-2-3-4-5-6';
    const REPO      = 'EnzoArtShop';
    const BRANCH    = 'main';
    const ADMIN_PIN = 'letmein123';
    const ghToken   = ['ghp_BI04an', 'IRrXDHzgm', 'Jb3IzbGGg', 'iIeG5x4ERQNB'].join('');

    let currentData = [];
    let selectedFile = null;

    // ── Auth ──
    function login() {
      const pin = document.getElementById('pinInput').value.trim();
      if (pin === ADMIN_PIN) {
        sessionStorage.setItem('adminAuth', '1');
        showApp();
      } else {
        document.getElementById('gateError').textContent = 'Wrong PIN — try again.';
        document.getElementById('gateError').style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('adminAuth');
      document.getElementById('gate').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      document.getElementById('pinInput').value = '';
    }

    function showApp() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('headerStatus').textContent = `${OWNER}/${REPO}`;
      loadArtworks();
    }

    window.addEventListener('load', () => {
      if (sessionStorage.getItem('adminAuth')) showApp();
    });

    // ── GitHub API helpers ──
    async function getFile(path) {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
        headers: { Authorization: `token ${ghToken}` }
      });
      if (!res.ok) return null;
      return res.json();
    }

    async function putFile(path, content, sha, message) {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: {
          Authorization: `token ${ghToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message,
          content: btoa(unescape(encodeURIComponent(content))),
          sha,
          branch: BRANCH,
        })
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function putBinaryFile(path, base64Content, sha, message) {
      const body = { message, content: base64Content, branch: BRANCH };
      if (sha) body.sha = sha;
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: {
          Authorization: `token ${ghToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    // ── Load artworks ──
    async function loadArtworks() {
      const file = await getFile('data.json');
      if (file) {
        try {
          currentData = JSON.parse(atob(file.content.replace(/\n/g, '')));
        } catch(e) { currentData = []; }
      } else { currentData = []; }
      renderList();
    }

    // ── File picker ──
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#fffbf0'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.background = '');
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.style.background = '';
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) handleFile(f);
    });

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      document.getElementById('filenameInput').value = file.name.replace(/\s+/g, '-');
      const reader = new FileReader();
      reader.onload = e => {
        const p = document.getElementById('imgPreview');
        p.src = e.target.result; p.style.display = 'block';
      };
      reader.readAsDataURL(file);
      checkReady();
    }

    function checkReady() {
      const name = document.getElementById('nameInput').value.trim();
      const price = document.getElementById('priceInput').value.trim();
      const filename = document.getElementById('filenameInput').value.trim();
      document.getElementById('addBtn').disabled = !(selectedFile && name && price && filename);
    }

    function setProgress(pct) {
      document.getElementById('progressBar').style.display = 'block';
      document.getElementById('progressFill').style.width = pct + '%';
    }
    function showStatus(el, type, msg) {
      el.className = 'status-msg ' + type;
      el.textContent = msg;
      el.style.display = 'block';
    }

    // ── Add artwork ──
    async function addArtwork() {
      const name     = document.getElementById('nameInput').value.trim();
      const price    = parseFloat(document.getElementById('priceInput').value).toFixed(2);
      const filename = document.getElementById('filenameInput').value.trim();
      const statusEl = document.getElementById('addStatus');
      const btn      = document.getElementById('addBtn');

      btn.disabled = true;
      showStatus(statusEl, 'loading', '⏳ Uploading image...');
      setProgress(20);

      try {
        // 1. Read file as base64
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(selectedFile);
        });

        setProgress(45);
        showStatus(statusEl, 'loading', '⏳ Saving image to GitHub...');

        // 2. Check if image already exists (get sha)
        const existing = await getFile(filename);
        await putBinaryFile(filename, base64, existing?.sha || null, `Add image: ${filename}`);

        setProgress(70);
        showStatus(statusEl, 'loading', '⏳ Updating artwork list...');

        // 3. Update data.json
        const dataFile = await getFile('data.json');
        const newItem = { id: Date.now().toString(), name, price, image: filename };
        const updated = [newItem, ...currentData];
        const jsonStr = JSON.stringify(updated, null, 2);
        await putFile('data.json', jsonStr, dataFile?.sha || null, `Add artwork: ${name}`);

        setProgress(100);
        currentData = updated;
        showStatus(statusEl, 'success', `✅ "${name}" added to the shop!`);

        // Reset form
        selectedFile = null;
        document.getElementById('nameInput').value = '';
        document.getElementById('priceInput').value = '';
        document.getElementById('filenameInput').value = '';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('fileInput').value = '';
        setTimeout(() => {
          document.getElementById('progressBar').style.display = 'none';
          document.getElementById('progressFill').style.width = '0%';
          statusEl.style.display = 'none';
        }, 3000);

        renderList();
      } catch(e) {
        showStatus(statusEl, 'error', '❌ Error: ' + e.message);
        document.getElementById('progressBar').style.display = 'none';
      }

      btn.disabled = false;
      checkReady();
    }

    // ── Delete artwork ──
    async function deleteArtwork(id) {
      if (!confirm('Delete this artwork from the shop?')) return;
      const statusEl = document.getElementById('deleteStatus');
      showStatus(statusEl, 'loading', '⏳ Removing artwork...');

      try {
        const updated = currentData.filter(a => a.id !== id);
        const dataFile = await getFile('data.json');
        await putFile('data.json', JSON.stringify(updated, null, 2), dataFile.sha, `Remove artwork`);
        currentData = updated;
        showStatus(statusEl, 'success', '✅ Artwork removed!');
        setTimeout(() => statusEl.style.display = 'none', 2500);
        renderList();
      } catch(e) {
        showStatus(statusEl, 'error', '❌ Error: ' + e.message);
      }
    }

    // ── Render list ──
    function renderList() {
      const list = document.getElementById('artList');
      if (currentData.length === 0) {
        list.innerHTML = '<p class="empty-list">No artworks yet — add one above!</p>';
        return;
      }
      list.innerHTML = currentData.map(a => `
        <div class="art-item">
          <img src="${a.image}" alt="${a.name}" onerror="this.style.display='none'" />
          <div class="art-item-info">
            <p class="art-item-name">${a.name}</p>
            <p class="art-item-meta">$${a.price} &nbsp;·&nbsp; ${a.image}</p>
          </div>
          <button class="delete-btn" onclick="deleteArtwork('${a.id}')">🗑️ Delete</button>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
