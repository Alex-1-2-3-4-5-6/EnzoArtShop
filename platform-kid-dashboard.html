<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard – KidsArt</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; background:#f4f6ff; font-family:'Nunito',sans-serif; }

    header {
      background:white; padding:16px 32px;
      display:flex; align-items:center; gap:12px;
      box-shadow:0 2px 12px rgba(0,0,0,0.07);
    }
    .logo { font-family:'Fredoka One',cursive; font-size:1.4rem; color:#ff6b6b; flex:1; }
    .logo span { color:#a29bfe; }
    .shop-btn {
      background:linear-gradient(135deg,#48dbfb,#a29bfe); border:none; border-radius:50px;
      padding:8px 18px; font-family:'Fredoka One',cursive; font-size:0.9rem;
      color:white; text-decoration:none; cursor:pointer;
    }
    .logout-btn {
      background:#f0f0f0; border:none; border-radius:50px;
      padding:8px 18px; font-family:'Fredoka One',cursive;
      font-size:0.9rem; cursor:pointer; color:#888;
    }

    .container { max-width:800px; margin:36px auto; padding:0 20px 80px; }

    .welcome { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#333; margin-bottom:28px; }

    .panel {
      background:white; border-radius:24px; padding:28px;
      box-shadow:0 4px 18px rgba(0,0,0,0.06); margin-bottom:24px;
    }
    .panel-title { font-family:'Fredoka One',cursive; font-size:1.2rem; color:#333; margin-bottom:18px; }

    /* Pending banner */
    .pending-banner {
      background:linear-gradient(135deg,#fff3cd,#ffeeba); border-radius:18px;
      padding:24px; text-align:center; margin-bottom:24px;
      border:2px solid #feca57;
    }
    .pending-banner .icon { font-size:3rem; margin-bottom:10px; }
    .pending-banner h3 { font-family:'Fredoka One',cursive; font-size:1.4rem; color:#856404; margin-bottom:6px; }
    .pending-banner p { color:#856404; font-size:0.9rem; }

    /* Profile */
    .profile-header { display:flex; align-items:center; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
    .avatar-wrap { position:relative; flex-shrink:0; }
    .avatar-img {
      width:82px; height:82px; border-radius:50%; object-fit:cover;
      border:4px solid #a29bfe; background:#f0f0f0;
      display:flex; align-items:center; justify-content:center; font-size:2rem;
      overflow:hidden;
    }
    .avatar-img img { width:100%; height:100%; object-fit:cover; display:none; }
    .avatar-upload-btn {
      position:absolute; bottom:2px; right:2px;
      background:#feca57; border:none; border-radius:50%;
      width:26px; height:26px; cursor:pointer; font-size:0.85rem;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }
    #avatarFileInput { display:none; }
    .profile-fields { flex:1; min-width:180px; display:flex; flex-direction:column; gap:10px; }
    .profile-fields input {
      padding:10px 14px; border:2.5px solid #e0e0e0; border-radius:12px;
      font-family:'Nunito',sans-serif; font-size:0.95rem; outline:none;
      transition:border-color 0.2s; width:100%;
    }
    .profile-fields input:focus { border-color:#a29bfe; }
    .save-btn {
      background:linear-gradient(135deg,#a29bfe,#ff9ff3); border:none;
      border-radius:50px; padding:10px 24px; color:white;
      font-family:'Fredoka One',cursive; font-size:0.95rem;
      cursor:pointer; align-self:flex-start; transition:transform 0.2s;
    }
    .save-btn:hover { transform:scale(1.03); }

    /* Submit art button */
    .submit-art-btn {
      display:inline-block; background:linear-gradient(135deg,#ff6b6b,#feca57);
      border:none; border-radius:50px; padding:14px 32px;
      color:white; font-family:'Fredoka One',cursive; font-size:1.1rem;
      cursor:pointer; text-decoration:none; transition:transform 0.2s;
    }
    .submit-art-btn:hover { transform:scale(1.04); }

    /* Artworks */
    .art-item {
      background:#fafafa; border-radius:14px; padding:14px 16px;
      display:flex; align-items:center; gap:14px; margin-bottom:10px;
      border:2px solid #eee;
    }
    .art-item img { width:60px; height:60px; object-fit:cover; border-radius:10px; flex-shrink:0; }
    .art-info { flex:1; }
    .art-name { font-family:'Fredoka One',cursive; font-size:1rem; color:#333; }
    .art-meta { font-size:0.8rem; color:#aaa; }
    .status-badge {
      border-radius:50px; padding:5px 14px; font-family:'Fredoka One',cursive; font-size:0.82rem;
    }
    .badge-pending { background:#fff3cd; color:#856404; }
    .badge-approved { background:#d4edda; color:#155724; }
    .badge-rejected { background:#ffd6d6; color:#c0392b; }

    .empty { text-align:center; padding:24px; font-family:'Fredoka One',cursive; color:#ccc; }

    .msg { margin-top:12px; padding:10px 14px; border-radius:10px; font-weight:700; font-size:0.88rem; display:none; }
    .msg.success { background:#d4edda; color:#155724; }
    .msg.error { background:#ffd6d6; color:#c0392b; }
    .msg.loading { background:#fff3cd; color:#856404; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Kids<span>Art</span></div>
    <a href="platform-shop.html" class="shop-btn">🛍️ Shop</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </header>

  <div class="container">
    <p class="welcome" id="welcome">👋 Hey there!</p>

    <!-- Pending approval banner -->
    <div class="pending-banner" id="pendingBanner" style="display:none">
      <div class="icon">⏳</div>
      <h3>Waiting for Parent Approval</h3>
      <p>Your parent hasn't approved your account yet. Ask them to check their dashboard!</p>
    </div>

    <!-- Main content (hidden until approved) -->
    <div id="mainContent" style="display:none">

      <!-- Profile panel -->
      <div class="panel">
        <p class="panel-title">👤 My Profile</p>
        <div class="profile-header">
          <div class="avatar-wrap">
            <div class="avatar-img" id="avatarEl">
              <span id="avatarEmoji">🧒</span>
              <img id="avatarImg" src="" alt="" />
            </div>
            <button class="avatar-upload-btn" onclick="document.getElementById('avatarFileInput').click()">✏️</button>
            <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(this.files[0])" />
          </div>
          <div class="profile-fields">
            <input type="text" id="profileName" placeholder="Your name" />
            <input type="date" id="profileDob" title="Date of birth" />
            <button class="save-btn" onclick="saveProfile()">Save Profile</button>
          </div>
        </div>
        <div class="msg" id="profileMsg"></div>
      </div>

      <!-- Submit art -->
      <div class="panel">
        <p class="panel-title">🎨 Submit Artwork</p>
        <p style="color:#aaa;font-size:0.9rem;margin-bottom:16px;">Submit your art for your parent to review and approve for the shop!</p>
        <a href="platform-submit.html" class="submit-art-btn">🖼️ Submit New Artwork</a>
      </div>

      <!-- My artworks -->
      <div class="panel">
        <p class="panel-title">📚 My Artworks</p>
        <div id="artworksList"><p class="empty">Loading...</p></div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://iwmviwhruzhwkokcjcnu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3bXZpd2hydXpod2tva2NqY251Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTE1MzYsImV4cCI6MjA5NjMyNzUzNn0.MtHOeTGyW5Q68HfYSJW7keNJGHpO5GCwJ2735ij_-JA';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'platform-login.html'; return; }
      currentUser = user;

      const meta = user.user_metadata || {};
      const name = meta.full_name || user.email;
      document.getElementById('welcome').textContent = `👋 Hey, ${name.split(' ')[0]}!`;
      loadProfile();

      // Check if this kid is approved
      const { data: kidRecord } = await sb.from('kids').select('kid_status').eq('kid_user_id', user.id).single();
      if (!kidRecord || kidRecord.kid_status === 'pending') {
        document.getElementById('pendingBanner').style.display = 'block';
      } else {
        document.getElementById('mainContent').style.display = 'block';
        loadArtworks();
      }
    }

    function loadProfile() {
      const meta = currentUser.user_metadata || {};
      document.getElementById('profileName').value = meta.full_name || '';
      document.getElementById('profileDob').value = meta.date_of_birth || '';
      if (meta.avatar_url) {
        document.getElementById('avatarEmoji').style.display = 'none';
        const img = document.getElementById('avatarImg');
        img.src = meta.avatar_url; img.style.display = 'block';
      }
    }

    async function uploadAvatar(file) {
      if (!file) return;
      const msg = document.getElementById('profileMsg');
      showMsg(msg, 'loading', '⏳ Uploading...');
      const ext = file.name.split('.').pop();
      const filename = `avatar-${currentUser.id}-${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage.from('avatars').upload(filename, file, { upsert: true, contentType: file.type });
      if (upErr) { showMsg(msg, 'error', upErr.message); return; }
      const { data: urlData } = sb.storage.from('avatars').getPublicUrl(filename);
      const { error } = await sb.auth.updateUser({ data: { ...currentUser.user_metadata, avatar_url: urlData.publicUrl } });
      if (error) { showMsg(msg, 'error', error.message); return; }
      currentUser = (await sb.auth.getUser()).data.user;
      loadProfile();
      showMsg(msg, 'success', '✅ Photo updated!');
    }

    async function saveProfile() {
      const name = document.getElementById('profileName').value.trim();
      const dob  = document.getElementById('profileDob').value;
      const msg  = document.getElementById('profileMsg');
      if (!name) { showMsg(msg, 'error', 'Please enter your name.'); return; }
      const { error } = await sb.auth.updateUser({ data: { ...currentUser.user_metadata, full_name: name, date_of_birth: dob } });
      if (error) { showMsg(msg, 'error', error.message); return; }
      currentUser = (await sb.auth.getUser()).data.user;
      document.getElementById('welcome').textContent = `👋 Hey, ${name.split(' ')[0]}!`;
      showMsg(msg, 'success', '✅ Profile saved!');
    }

    async function loadArtworks() {
      const { data } = await sb.from('artworks').select('*').eq('parent_id', currentUser.id).order('created_at', { ascending: false });
      // Actually artworks are linked by kid_id, but we don't have kid_id here easily.
      // Let's load by checking kid records for this user
      const { data: kidRec } = await sb.from('kids').select('id').eq('kid_user_id', currentUser.id).single();
      if (!kidRec) { document.getElementById('artworksList').innerHTML = '<p class="empty">No artworks yet</p>'; return; }
      const { data: arts } = await sb.from('artworks').select('*').eq('kid_id', kidRec.id).order('created_at', { ascending: false });
      const el = document.getElementById('artworksList');
      if (!arts || arts.length === 0) { el.innerHTML = '<p class="empty">No artworks yet — submit your first one! 🎨</p>'; return; }
      el.innerHTML = arts.map(a => `
        <div class="art-item">
          <img src="${a.image_url}" alt="${a.name}" />
          <div class="art-info">
            <p class="art-name">${a.name}</p>
            <p class="art-meta">$${a.price}</p>
          </div>
          <span class="status-badge badge-${a.status}">${a.status === 'approved' ? '✅ Live' : a.status === 'rejected' ? '❌ Not approved' : '⏳ Pending'}</span>
        </div>
      `).join('');
    }

    function showMsg(el, type, text) {
      el.className = 'msg ' + type; el.textContent = text; el.style.display = 'block';
      if (type !== 'loading') setTimeout(() => el.style.display = 'none', 3000);
    }

    async function logout() { await sb.auth.signOut(); window.location.href = 'platform-login.html'; }
    init();
  </script>
</body>
</html>
