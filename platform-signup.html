<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – KidsArt</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; font-family:'Nunito',sans-serif;
      background:linear-gradient(135deg,#ff9ff3,#feca57,#48dbfb,#a29bfe);
      background-size:300% 300%; animation:gradientShift 8s ease infinite;
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .card {
      background:white; border-radius:28px; padding:40px 36px;
      max-width:460px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .logo { font-family:'Fredoka One',cursive; font-size:1.5rem; color:#ff6b6b; margin-bottom:6px; }
    .logo span { color:#a29bfe; }
    h2 { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#333; margin-bottom:6px; }
    .sub { color:#aaa; font-size:0.9rem; margin-bottom:24px; }
    .coppa-note {
      background:#f8f8f8; border-radius:12px; padding:14px 16px;
      margin-bottom:20px; font-size:0.82rem; color:#777; line-height:1.5;
    }
    .field { margin-bottom:16px; }
    .field label { display:block; font-weight:700; color:#555; margin-bottom:6px; font-size:0.9rem; }
    .field input {
      width:100%; padding:13px 16px; border:2.5px solid #e0e0e0;
      border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem;
      outline:none; transition:border-color 0.2s;
    }
    .field input:focus { border-color:#feca57; }
    .submit-btn {
      width:100%; background:linear-gradient(135deg,#ff6b6b,#feca57);
      border:none; border-radius:50px; padding:15px;
      color:white; font-family:'Fredoka One',cursive; font-size:1.15rem;
      cursor:pointer; transition:transform 0.2s; margin-top:8px;
    }
    .submit-btn:hover { transform:scale(1.02); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .msg { margin-top:14px; padding:12px 16px; border-radius:12px; font-weight:700; font-size:0.9rem; display:none; }
    .msg.error { background:#ffd6d6; color:#c0392b; }
    .msg.success { background:#d4edda; color:#155724; }
    .login-link { text-align:center; margin-top:20px; font-size:0.9rem; color:#aaa; }
    .login-link a { color:#ff6b6b; font-weight:700; text-decoration:none; }
    .back-link { text-align:center; margin-top:10px; }
    .back-link a { color:#aaa; font-size:0.85rem; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Kids<span>Art</span></div>
    <h2>Create Account</h2>
    <p class="sub">Parents & guardians only</p>

    <div class="coppa-note">
      <strong>🔒 COPPA Notice:</strong> This account is for parents and guardians only. We do not collect personal information from children. You manage your child's artwork on their behalf.
    </div>

    <div class="field">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="e.g. Maria Garcia" />
    </div>
    <div class="field">
      <label>Date of Birth</label>
      <input type="date" id="dob" />
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password" />
    </div>

    <button class="submit-btn" id="signupBtn" onclick="signup()">Create Account</button>
    <div class="msg" id="msg"></div>
    <p class="login-link">Already have an account? <a href="platform-login.html">Log in</a></p>
    <p class="back-link"><a href="platform-index.html">← Back to home</a></p>
  </div>

  <script>
    const SUPABASE_URL = 'https://iwmviwhruzhwkokcjcnu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3bXZpd2hydXpod2tva2NqY251Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTE1MzYsImV4cCI6MjA5NjMyNzUzNn0.MtHOeTGyW5Q68HfYSJW7keNJGHpO5GCwJ2735ij_-JA';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showMsg(type, text) {
      const el = document.getElementById('msg');
      el.className = 'msg ' + type; el.textContent = text; el.style.display = 'block';
    }

    async function signup() {
      const name     = document.getElementById('name').value.trim();
      const dob      = document.getElementById('dob').value;
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('signupBtn');

      if (!name || !dob || !email || !password) return showMsg('error', 'Please fill in all fields.');
      if (password.length < 6) return showMsg('error', 'Password must be at least 6 characters.');
      if (password !== confirm) return showMsg('error', 'Passwords do not match.');

      btn.disabled = true; btn.textContent = 'Creating account...';

      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name, date_of_birth: dob } }
      });

      if (error) {
        showMsg('error', error.message);
        btn.disabled = false; btn.textContent = 'Create Account';
      } else {
        showMsg('success', '✅ Account created! You can now log in.');
        btn.textContent = 'Done!';
        setTimeout(() => window.location.href = 'platform-login.html', 2000);
      }
    }
  </script>
</body>
</html>
