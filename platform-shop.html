<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop – Little Heartworks</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; background:#fff9f0; font-family:'Nunito',sans-serif; }

    header {
      background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#a29bfe);
      background-size:300% 300%; animation:gradientShift 8s ease infinite;
      padding:20px 32px; display:flex; align-items:center; gap:16px;
      box-shadow:0 4px 20px rgba(0,0,0,0.15);
    }
    @keyframes gradientShift {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    .logo { font-family:'Fredoka One',cursive; font-size:1.6rem; color:white; flex:1; text-shadow:0 2px 8px rgba(0,0,0,0.15); }
    .home-btn {
      background:white; border:none; border-radius:50px; padding:8px 18px;
      font-family:'Fredoka One',cursive; font-size:0.95rem; color:#ff6b6b;
      text-decoration:none; cursor:pointer; transition:transform 0.2s;
    }
    .home-btn:hover { transform:scale(1.05); }
    .account-btn {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.6);
      border-radius:50px; padding:7px 16px 7px 8px;
      font-family:'Fredoka One',cursive; font-size:0.9rem; color:white;
      text-decoration:none; cursor:pointer; transition:all 0.2s; backdrop-filter:blur(6px);
    }
    .account-btn:hover { background:rgba(255,255,255,0.35); }
    .account-pfp {
      width:32px; height:32px; border-radius:50%; border:2px solid white;
      object-fit:cover; background:rgba(255,255,255,0.3);
      display:flex; align-items:center; justify-content:center; font-size:1rem;
      overflow:hidden; flex-shrink:0;
    }
    .account-pfp img { width:100%; height:100%; object-fit:cover; display:none; }

    .search-wrap { max-width:700px; margin:36px auto 0; padding:0 20px; }
    .search-wrap input {
      width:100%; padding:16px 24px; border-radius:50px;
      border:3px solid #feca57; font-family:'Nunito',sans-serif;
      font-size:1.1rem; outline:none;
      box-shadow:0 4px 15px rgba(254,202,87,0.3); transition:border-color 0.2s;
    }
    .search-wrap input:focus { border-color:#ff6b6b; }

    .section-label {
      max-width:960px; margin:28px auto 16px; padding:0 20px;
      font-family:'Fredoka One',cursive; font-size:1.4rem; color:#444;
    }

    .grid {
      max-width:960px; margin:0 auto 60px; padding:0 20px;
      display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:28px;
    }

    .card {
      background:white; border-radius:24px; overflow:hidden;
      box-shadow:0 6px 20px rgba(0,0,0,0.08);
      transition:transform 0.25s,box-shadow 0.25s; border:3px solid transparent;
    }
    .card:hover { transform:translateY(-6px) scale(1.02); box-shadow:0 14px 35px rgba(0,0,0,0.13); border-color:#feca57; }
    .card-img { width:100%; height:auto; display:block; object-fit:contain; background:#f8f8f8; }
    .card-body { padding:16px 18px 20px; }
    .card-title { font-family:'Fredoka One',cursive; font-size:1.1rem; color:#333; margin-bottom:6px; }
    .card-price { font-family:'Fredoka One',cursive; font-size:1.2rem; color:#ff6b6b; margin-bottom:14px; }
    .card-btn {
      display:block; background:linear-gradient(135deg,#a29bfe,#ff9ff3);
      border:none; border-radius:50px; padding:10px 0; width:100%;
      color:white; font-family:'Fredoka One',cursive; font-size:1rem;
      cursor:pointer; transition:opacity 0.2s;
    }
    .card-btn:hover { opacity:0.85; }

    .empty-state { max-width:960px; margin:80px auto; text-align:center; padding:0 20px; }
    .empty-state .icon { font-size:5rem; margin-bottom:16px; }
    .empty-state h2 { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#ccc; margin-bottom:8px; }
    .empty-state p { color:#aaa; }

    /* Modal */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .overlay.open { display:flex; }
    .modal {
      background:white; border-radius:32px; width:100%; max-width:92vw;
      max-height:90vh; overflow-y:auto;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
      animation:popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-img { width:100%; height:auto; display:block; object-fit:contain; background:#f8f8f8; border-radius:32px 32px 0 0; }
    .modal-body { padding:24px 28px 32px; }
    .modal-title { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#333; margin-bottom:8px; }
    .modal-price { font-family:'Fredoka One',cursive; font-size:2rem; color:#ff6b6b; margin-bottom:22px; }
    .modal-actions { display:flex; gap:12px; }
    .btn-buy {
      flex:1; background:linear-gradient(135deg,#ff6b6b,#feca57);
      border:none; border-radius:50px; padding:15px; color:white;
      font-family:'Fredoka One',cursive; font-size:1.1rem; cursor:pointer; transition:transform 0.2s;
    }
    .btn-buy:hover { transform:scale(1.04); }
    .btn-close {
      background:#f0f0f0; border:none; border-radius:50px; padding:15px 22px;
      font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; color:#888;
    }

    /* Buy form */
    .buy-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; padding:20px; }
    .buy-overlay.open { display:flex; }
    .buy-modal {
      background:white; border-radius:28px; width:100%; max-width:460px;
      max-height:90vh; overflow-y:auto; padding:32px;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
      animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    .buy-modal h2 { font-family:'Fredoka One',cursive; font-size:1.5rem; color:#333; margin-bottom:6px; }
    .buy-modal .art-name { font-family:'Fredoka One',cursive; color:#ff6b6b; font-size:1rem; margin-bottom:22px; }
    .form-field { margin-bottom:16px; }
    .form-field label { display:block; font-weight:700; color:#555; margin-bottom:6px; font-size:0.9rem; }
    .form-field input {
      width:100%; padding:13px 16px; border:2.5px solid #e0e0e0; border-radius:12px;
      font-family:'Nunito',sans-serif; font-size:1rem; outline:none; transition:border-color 0.2s;
    }
    .form-field input:focus { border-color:#feca57; }
    .radio-option {
      display:flex; align-items:center; gap:10px; background:#f8f8f8;
      border-radius:12px; padding:12px 16px; cursor:pointer;
      border:2.5px solid #e0e0e0; transition:all 0.2s; margin-bottom:8px;
    }
    .radio-option:hover { border-color:#feca57; background:#fffbf0; }
    .radio-option input[type="radio"] { accent-color:#ff6b6b; width:18px; height:18px; }
    .radio-option span { font-weight:700; color:#444; font-size:0.95rem; }
    .form-actions { display:flex; gap:12px; margin-top:20px; }
    .form-submit {
      flex:1; background:linear-gradient(135deg,#ff6b6b,#feca57);
      border:none; border-radius:50px; padding:14px; color:white;
      font-family:'Fredoka One',cursive; font-size:1.05rem; cursor:pointer;
    }
    .form-cancel {
      background:#f0f0f0; border:none; border-radius:50px; padding:14px 20px;
      font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; color:#888;
    }
    .success-screen { display:none; text-align:center; padding:10px 0; }
    .success-screen .icon { font-size:3.5rem; margin-bottom:12px; }
    .success-screen h3 { font-family:'Fredoka One',cursive; font-size:1.5rem; color:#333; margin-bottom:8px; }
    .success-screen p { color:#777; margin-bottom:20px; }
    .done-btn { background:linear-gradient(135deg,#a29bfe,#ff9ff3); border:none; border-radius:50px; padding:12px 32px; color:white; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; }

    footer { background:#2d2d2d; padding:20px 32px; text-align:center; }
    footer a { color:#888; text-decoration:none; font-size:0.85rem; margin:0 10px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎨 Little He<span style="color:#fff176;">art</span>works</div>
    <a href="platform-index.html" class="home-btn">← Home</a>
    <a href="#" class="account-btn" id="accountBtn" onclick="handleAccountClick(event)">
      <div class="account-pfp" id="accountPfp">
        <span id="accountEmoji">👤</span>
        <img id="accountImg" src="" alt="" />
      </div>
      <span id="accountLabel">Sign In</span>
    </a>
  </header>

  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search for art... 🔍" oninput="renderGrid()" />
  </div>

  <p class="section-label" id="sectionLabel"></p>
  <div class="grid" id="grid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🖌️</div>
    <h2>No art yet!</h2>
    <p>Check back soon — kids are creating!</p>
  </div>

  <!-- Preview modal -->
  <div class="overlay" id="overlay" onclick="closePreview(event)">
    <div class="modal">
      <img class="modal-img" id="modalImg" src="" alt="" />
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-price" id="modalPrice"></p>
        <div class="modal-actions">
          <button class="btn-buy" onclick="openBuyForm()">🛒 I Want This!</button>
          <button class="btn-close" onclick="closePreview()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Buy form -->
  <div class="buy-overlay" id="buyOverlay">
    <div class="buy-modal">
      <div id="buyForm">
        <h2>🛒 Claim This Artwork</h2>
        <p class="art-name" id="buyArtName"></p>
        <div class="form-field">
          <label>Your Name</label>
          <input type="text" id="buyerName" placeholder="e.g. Grandma Rosa" />
        </div>
        <div class="form-field">
          <label>Your Email</label>
          <input type="email" id="buyerEmail" placeholder="your@email.com" />
        </div>
        <div class="form-field">
          <label>Payment Method</label>
          <label class="radio-option">
            <input type="radio" name="payment" value="Pay in cash" checked />
            <span>💵 Pay in Cash</span>
          </label>
        </div>
        <div class="form-field">
          <label>Delivery</label>
          <label class="radio-option">
            <input type="radio" name="delivery" value="Deliver in person" checked />
            <span>🤝 Deliver in Person</span>
          </label>
        </div>
        <div class="form-actions">
          <button class="form-submit" onclick="submitClaim()">Send Request!</button>
          <button class="form-cancel" onclick="closeBuyForm()">✕</button>
        </div>
      </div>
      <div class="success-screen" id="successScreen">
        <div class="icon">🎉</div>
        <h3>Request Sent!</h3>
        <p id="successMsg"></p>
        <button class="done-btn" onclick="closeBuyForm()">Done</button>
      </div>
    </div>
  </div>

  <footer>
    <a href="platform-privacy.html">Privacy Policy</a>
    <a href="platform-terms.html">Terms of Use</a>
  </footer>

  <script>
    const SUPABASE_URL = 'https://iwmviwhruzhwkokcjcnu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3bXZpd2hydXpod2tva2NqY251Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTE1MzYsImV4cCI6MjA5NjMyNzUzNn0.MtHOeTGyW5Q68HfYSJW7keNJGHpO5GCwJ2735ij_-JA';
    const WEB3FORMS_KEY = 'd0c60520-e920-4f5d-90bc-d6b71aa29543';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allArtworks = [];
    let currentArtId = null;
    let currentUser = null;

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      currentUser = user;
      if (user) {
        const meta = user.user_metadata || {};
        const name = (meta.full_name || user.email).split(' ')[0];
        document.getElementById('accountLabel').textContent = name;
        if (meta.avatar_url) {
          document.getElementById('accountEmoji').style.display = 'none';
          const img = document.getElementById('accountImg');
          img.src = meta.avatar_url; img.style.display = 'block';
        }
      }
      loadArtworks();
    }

    function handleAccountClick(e) {
      e.preventDefault();
      window.location.href = currentUser ? 'platform-dashboard.html' : 'platform-login.html';
    }

    async function loadArtworks() {
      const { data } = await sb.from('artworks').select('*').eq('status','approved').order('created_at',{ascending:false});
      allArtworks = data || [];
      renderGrid();
    }

    function renderGrid() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const grid = document.getElementById('grid');
      const label = document.getElementById('sectionLabel');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';

      if (allArtworks.length === 0) { empty.style.display='block'; label.style.display='none'; return; }
      empty.style.display = 'none';

      const filtered = allArtworks.filter(a => !query || a.name.toLowerCase().includes(query));
      label.style.display = 'block';
      label.textContent = query ? `${filtered.length} result${filtered.length!==1?'s':''} for "${query}" ✨` : `All Artworks ✨ (${filtered.length})`;

      filtered.forEach(art => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img class="card-img" src="${art.image_url}" alt="${art.name}" loading="lazy" />
          <div class="card-body">
            <p class="card-title">${art.name}</p>
            <p class="card-price">$${art.price}</p>
            <button class="card-btn" onclick="openPreview('${art.id}')">👀 Preview & Buy</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function openPreview(id) {
      currentArtId = id;
      const art = allArtworks.find(a => a.id === id);
      document.getElementById('modalImg').src = art.image_url;
      document.getElementById('modalTitle').textContent = art.name;
      document.getElementById('modalPrice').textContent = '$' + art.price;
      document.getElementById('overlay').classList.add('open');
    }
    function closePreview(e) {
      if (!e || e.target === document.getElementById('overlay'))
        document.getElementById('overlay').classList.remove('open');
    }

    function openBuyForm() {
      if (!currentUser) {
        if (confirm('You need to be logged in to purchase art.\n\nGo to Sign In?')) {
          window.location.href = 'platform-login.html';
        }
        return;
      }
      const art = allArtworks.find(a => a.id === currentArtId);
      document.getElementById('buyArtName').textContent = '🎨 ' + art.name + ' — $' + art.price;
      document.getElementById('buyForm').style.display = 'block';
      document.getElementById('successScreen').style.display = 'none';
      const meta = currentUser.user_metadata || {};
      document.getElementById('buyerName').value = meta.full_name || '';
      document.getElementById('buyerEmail').value = currentUser.email || '';
      document.getElementById('buyOverlay').classList.add('open');
    }
    function closeBuyForm() { document.getElementById('buyOverlay').classList.remove('open'); }

    async function submitClaim() {
      const art   = allArtworks.find(a => a.id === currentArtId);
      const name  = document.getElementById('buyerName').value.trim();
      const email = document.getElementById('buyerEmail').value.trim();
      if (!name || !email) { alert('Please fill in your name and email.'); return; }

      const payment  = document.querySelector('input[name="payment"]:checked')?.value || 'Pay in cash';
      const delivery = document.querySelector('input[name="delivery"]:checked')?.value || 'Deliver in person';

      try {
        await fetch('https://api.web3forms.com/submit', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            access_key: WEB3FORMS_KEY,
            subject: `🎨 New Art Request: ${art.name}`,
            from_name: "KidsArt Platform",
            message:
              `Someone wants to buy artwork!\n\n` +
              `Artwork: ${art.name}\nPrice: $${art.price}\n\n` +
              `Buyer: ${name}\nEmail: ${email}\n` +
              `Payment: ${payment}\nDelivery: ${delivery}`
          })
        });
        document.getElementById('buyForm').style.display = 'none';
        document.getElementById('successMsg').textContent = `Thanks ${name}! We'll be in touch soon. 😊`;
        document.getElementById('successScreen').style.display = 'block';
      } catch(e) {
        alert('Something went wrong. Please try again.');
      }
    }

    document.addEventListener('keydown', e => { if(e.key==='Escape'){closePreview();closeBuyForm();} });
    init();
  </script>
</body>
</html>
