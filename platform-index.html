<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KidsArt – Where Young Artists Shine</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; font-family:'Nunito',sans-serif;
      background:linear-gradient(135deg,#ff9ff3,#feca57,#48dbfb,#a29bfe);
      background-size:300% 300%; animation:gradientShift 10s ease infinite;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:28px; text-align:center;
    }
    @keyframes gradientShift {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    .logo {
      font-family:'Fredoka One',cursive; font-size:clamp(2.4rem,8vw,4rem);
      color:white; text-shadow:0 4px 24px rgba(0,0,0,0.2); margin-bottom:10px;
    }
    .logo span { color:#fff176; }
    .tagline { font-size:1.1rem; color:rgba(255,255,255,0.92); margin-bottom:44px; font-weight:700; }
    .shop-btn {
      display:inline-block; background:white; border:none; border-radius:50px;
      padding:18px 52px; font-family:'Fredoka One',cursive; font-size:1.4rem;
      color:#ff6b6b; cursor:pointer; text-decoration:none;
      box-shadow:0 8px 32px rgba(0,0,0,0.2); transition:transform 0.2s,box-shadow 0.2s;
      margin-bottom:44px;
    }
    .shop-btn:hover { transform:scale(1.06) translateY(-3px); box-shadow:0 16px 44px rgba(0,0,0,0.25); }
    .divider { color:rgba(255,255,255,0.8); font-weight:700; margin-bottom:18px; font-size:0.95rem; }
    .account-btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:18px; }
    .acc-btn {
      background:rgba(255,255,255,0.22); border:2.5px solid rgba(255,255,255,0.65);
      border-radius:50px; padding:13px 28px; font-family:'Fredoka One',cursive;
      font-size:1rem; color:white; cursor:pointer; text-decoration:none;
      backdrop-filter:blur(8px); transition:all 0.2s;
    }
    .acc-btn:hover { background:rgba(255,255,255,0.38); transform:scale(1.04); }
    .acc-btn.solid { background:white; color:#a29bfe; border-color:white; }
    .acc-btn.solid:hover { background:#f4f0ff; }
    .acc-btn.small { font-size:0.88rem; padding:10px 22px; }
    .logged-in-card {
      background:rgba(255,255,255,0.22); border-radius:28px; padding:24px 36px;
      backdrop-filter:blur(12px); border:2.5px solid rgba(255,255,255,0.45);
      display:none; flex-direction:column; align-items:center; gap:14px;
      box-shadow:0 8px 32px rgba(0,0,0,0.1);
    }
    .pfp-circle {
      width:76px; height:76px; border-radius:50%; border:4px solid white;
      overflow:hidden; background:rgba(255,255,255,0.3);
      display:flex; align-items:center; justify-content:center; font-size:2.2rem;
    }
    .pfp-circle img { width:100%; height:100%; object-fit:cover; display:none; }
    .logged-name { font-family:'Fredoka One',cursive; font-size:1.25rem; color:white; }
    .logged-email { font-size:0.82rem; color:rgba(255,255,255,0.75); margin-top:-10px; }
    .dash-link {
      background:white; border-radius:50px; padding:11px 28px;
      font-family:'Fredoka One',cursive; font-size:1rem; color:#ff6b6b;
      text-decoration:none; transition:transform 0.2s; box-shadow:0 4px 14px rgba(0,0,0,0.12);
    }
    .dash-link:hover { transform:scale(1.05); }
    .logout-btn {
      color:rgba(255,255,255,0.7); font-size:0.85rem; cursor:pointer; font-weight:700;
      background:none; border:none; font-family:'Nunito',sans-serif;
    }
    .bubble { position:fixed; border-radius:50%; opacity:0.1; pointer-events:none; animation:floatUp linear infinite; }
    @keyframes floatUp { 0%{transform:translateY(110vh)} 100%{transform:translateY(-20vh)} }
  </style>
</head>
<body>

  <div class="logo">He<span style="color:#fff176;">art</span>work 🎨</div>

  <a href="platform-shop.html" class="shop-btn">🛍️ Enter the Shop</a>

  <div id="guestSection">
    <p class="divider">— Parent accounts —</p>
    <div class="account-btns">
      <a href="platform-signup.html" class="acc-btn solid">👨‍👩‍👧 Create Parent Account</a>
      <a href="platform-login.html" class="acc-btn">Log In →</a>
    </div>
  </div>

  <div class="logged-in-card" id="loggedInCard">
    <div class="pfp-circle" id="pfpCircle">
      <span id="pfpEmoji">🧑</span>
      <img id="pfpImg" src="" alt="" />
    </div>
    <p class="logged-name" id="loggedName"></p>
    <p class="logged-email" id="loggedEmail"></p>
    <a href="#" id="dashLink" class="dash-link">🎨 My Dashboard</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://iwmviwhruzhwkokcjcnu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3bXZpd2hydXpod2tva2NqY251Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTE1MzYsImV4cCI6MjA5NjMyNzUzNn0.MtHOeTGyW5Q68HfYSJW7keNJGHpO5GCwJ2735ij_-JA';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Floating bubbles
    const colors = ['#ff6b6b','#feca57','#48dbfb','#a29bfe','#ff9ff3'];
    for (let i = 0; i < 10; i++) {
      const b = document.createElement('div'); b.className = 'bubble';
      const s = 40 + Math.random() * 90;
      b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[i%colors.length]};animation-duration:${9+Math.random()*10}s;animation-delay:${Math.random()*9}s;`;
      document.body.appendChild(b);
    }

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return;
      document.getElementById('guestSection').style.display = 'none';
      const card = document.getElementById('loggedInCard');
      card.style.display = 'flex';
      const meta = user.user_metadata || {};
      document.getElementById('loggedName').textContent = meta.full_name || user.email;
      document.getElementById('loggedEmail').textContent = user.email;
      document.getElementById('dashLink').href = 'platform-dashboard.html';
      if (meta.avatar_url) {
        document.getElementById('pfpEmoji').style.display = 'none';
        const img = document.getElementById('pfpImg');
        img.src = meta.avatar_url; img.style.display = 'block';
      }
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }
    init();
  </script>
</body>
</html>
