<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – KidsArt Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; background:#f4f6ff; font-family:'Nunito',sans-serif; }

    header {
      background:white; padding:16px 32px;
      display:flex; align-items:center; gap:16px;
      box-shadow:0 2px 12px rgba(0,0,0,0.07);
    }
    .logo { font-family:'Fredoka One',cursive; font-size:1.4rem; color:#ff6b6b; flex:1; }
    .logo span { color:#a29bfe; }
    .user-info { font-size:0.9rem; color:#aaa; font-weight:700; }
    .logout-btn {
      background:#f0f0f0; border:none; border-radius:50px;
      padding:8px 18px; font-family:'Fredoka One',cursive;
      font-size:0.9rem; cursor:pointer; color:#888;
    }
    .logout-btn:hover { background:#e0e0e0; }
    .shop-btn {
      background:linear-gradient(135deg,#48dbfb,#a29bfe); border:none; border-radius:50px;
      padding:8px 18px; font-family:'Fredoka One',cursive;
      font-size:0.9rem; cursor:pointer; color:white; text-decoration:none;
    }

    /* Link code */
    .link-code-box {
      background:linear-gradient(135deg,#f4f0ff,#fff0f9); border-radius:16px;
      padding:20px; margin-bottom:16px; text-align:center; border:2px dashed #a29bfe;
    }
    .link-code-display {
      font-family:'Fredoka One',cursive; font-size:2.4rem; letter-spacing:6px;
      color:#a29bfe; margin:10px 0;
    }
    .code-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .copy-btn, .regen-btn {
      border:none; border-radius:50px; padding:9px 20px;
      font-family:'Fredoka One',cursive; font-size:0.88rem; cursor:pointer; transition:transform 0.2s;
    }
    .copy-btn { background:#a29bfe; color:white; }
    .copy-btn:hover { transform:scale(1.05); }
    .regen-btn { background:#f0f0f0; color:#888; }
    .regen-btn:hover { background:#e0e0e0; }

    /* Pending kids */
    .pending-kid-item {
      background:#fafafa; border-radius:14px; padding:14px 16px;
      display:flex; align-items:center; gap:12px;
      margin-bottom:10px; border:2px solid #eee;
    }
    .pending-kid-info { flex:1; }
    .pending-kid-name { font-family:'Fredoka One',cursive; font-size:1rem; color:#333; }
    .pending-kid-meta { font-size:0.8rem; color:#aaa; margin-top:2px; }
    .pending-kid-actions { display:flex; gap:8px; }

    .container { max-width:900px; margin:36px auto; padding:0 20px 80px; }

    .welcome {
      font-family:'Fredoka One',cursive; font-size:1.8rem;
      color:#333; margin-bottom:28px;
    }

    .panel {
      background:white; border-radius:24px; padding:28px;
      box-shadow:0 4px 18px rgba(0,0,0,0.06); margin-bottom:24px;
    }
    .panel-title {
      font-family:'Fredoka One',cursive; font-size:1.2rem;
      color:#333; margin-bottom:18px; display:flex; align-items:center; gap:8px;
    }

    /* Kids */
    .kid-list { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:16px; }
    .kid-chip {
      background:linear-gradient(135deg,#a29bfe,#ff9ff3);
      color:white; border-radius:50px; padding:8px 20px;
      font-family:'Fredoka One',cursive; font-size:0.95rem;
      display:flex; align-items:center; gap:8px;
    }
    .kid-chip button {
      background:rgba(255,255,255,0.3); border:none; border-radius:50%;
      width:20px; height:20px; cursor:pointer; color:white;
      font-size:0.75rem; display:flex; align-items:center; justify-content:center;
    }

    .add-kid-form { display:flex; gap:10px; flex-wrap:wrap; }
    .add-kid-form input {
      flex:1; min-width:140px; padding:11px 16px;
      border:2.5px solid #e0e0e0; border-radius:12px;
      font-family:'Nunito',sans-serif; font-size:0.95rem; outline:none;
      transition:border-color 0.2s;
    }
    .add-kid-form input:focus { border-color:#a29bfe; }
    .add-kid-btn {
      background:linear-gradient(135deg,#a29bfe,#ff9ff3);
      border:none; border-radius:50px; padding:11px 24px;
      color:white; font-family:'Fredoka One',cursive; font-size:0.95rem;
      cursor:pointer; white-space:nowrap;
    }

    /* Pending artworks */
    .pending-item {
      background:#fafafa; border-radius:16px; padding:16px;
      display:flex; align-items:flex-start; gap:14px;
      margin-bottom:12px; border:2px solid #eee;
    }
    .pending-item img {
      width:80px; height:80px; object-fit:cover;
      border-radius:12px; flex-shrink:0; background:#eee;
    }
    .pending-info { flex:1; min-width:0; }
    .pending-name { font-family:'Fredoka One',cursive; font-size:1.05rem; color:#333; }
    .pending-meta { font-size:0.82rem; color:#aaa; margin:3px 0 10px; }
    .pending-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .approve-btn {
      background:#d4edda; border:none; border-radius:50px;
      padding:7px 18px; color:#155724; font-family:'Fredoka One',cursive;
      font-size:0.88rem; cursor:pointer; transition:background 0.2s;
    }
    .approve-btn:hover { background:#b8ddc5; }
    .reject-btn {
      background:#ffd6d6; border:none; border-radius:50px;
      padding:7px 18px; color:#c0392b; font-family:'Fredoka One',cursive;
      font-size:0.88rem; cursor:pointer; transition:background 0.2s;
    }
    .reject-btn:hover { background:#ffbcbc; }

    /* Approved artworks */
    .approved-item {
      background:#fafafa; border-radius:16px; padding:14px 16px;
      display:flex; align-items:center; gap:14px;
      margin-bottom:10px; border:2px solid #d4edda;
    }
    .approved-item img { width:60px; height:60px; object-fit:cover; border-radius:10px; flex-shrink:0; }
    .approved-info { flex:1; }
    .approved-name { font-family:'Fredoka One',cursive; font-size:1rem; color:#333; }
    .approved-meta { font-size:0.8rem; color:#aaa; }
    .remove-btn {
      background:#fff0f0; border:none; border-radius:50px;
      padding:7px 16px; color:#ff6b6b; font-family:'Fredoka One',cursive;
      font-size:0.82rem; cursor:pointer;
    }

    .submit-art-btn {
      display:inline-block; background:linear-gradient(135deg,#ff6b6b,#feca57);
      border:none; border-radius:50px; padding:13px 30px;
      color:white; font-family:'Fredoka One',cursive; font-size:1.05rem;
      cursor:pointer; text-decoration:none; transition:transform 0.2s;
      margin-top:4px;
    }
    .submit-art-btn:hover { transform:scale(1.03); }

    .empty { text-align:center; padding:24px; font-family:'Fredoka One',cursive; font-size:1rem; color:#ccc; }

    .status-msg {
      padding:10px 14px; border-radius:10px; font-weight:700;
      font-size:0.88rem; margin-top:10px; display:none;
    }
    .status-msg.success { background:#d4edda; color:#155724; }
    .status-msg.error { background:#ffd6d6; color:#c0392b; }
    .status-msg.loading { background:#fff3cd; color:#856404; }

    /* Profile panel */
    .profile-header {
      display:flex; align-items:center; gap:20px; margin-bottom:22px; flex-wrap:wrap;
    }
    .avatar-wrap { position:relative; flex-shrink:0; }
    .avatar-img {
      width:88px; height:88px; border-radius:50%; object-fit:cover;
      border:4px solid #a29bfe; background:#f0f0f0;
      display:flex; align-items:center; justify-content:center;
      font-size:2.2rem;
    }
    .avatar-upload-btn {
      position:absolute; bottom:2px; right:2px;
      background:#feca57; border:none; border-radius:50%;
      width:26px; height:26px; cursor:pointer; font-size:0.85rem;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }
    #avatarFileInput { display:none; }
    .profile-fields { flex:1; min-width:200px; display:flex; flex-direction:column; gap:10px; }
    .profile-fields input {
      padding:10px 14px; border:2.5px solid #e0e0e0;
      border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem;
      outline:none; transition:border-color 0.2s; width:100%;
    }
    .profile-fields input:focus { border-color:#a29bfe; }
    .save-profile-btn {
      background:linear-gradient(135deg,#a29bfe,#ff9ff3);
      border:none; border-radius:50px; padding:10px 24px;
      color:white; font-family:'Fredoka One',cursive; font-size:0.95rem;
      cursor:pointer; align-self:flex-start; transition:transform 0.2s;
    }
    .save-profile-btn:hover { transform:scale(1.03); }
    .save-profile-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Kids<span>Art</span></div>
    <a href="platform-shop.html" class="shop-btn">🛍️ Shop</a>
    <span class="user-info" id="userInfo"></span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </header>

  <div class="container">
    <p class="welcome" id="welcome">👋 Welcome back!</p>

    <!-- Profile panel -->
    <div class="panel">
      <p class="panel-title">👤 My Profile</p>
      <div class="profile-header">
        <div class="avatar-wrap">
          <img class="avatar-img" id="avatarImg" src="" alt="avatar" onerror="this.src=''" />
          <button class="avatar-upload-btn" onclick="document.getElementById('avatarFileInput').click()" title="Change photo">✏️</button>
          <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(this.files[0])" />
        </div>
        <div class="profile-fields">
          <input type="text" id="profileName" placeholder="Your full name" />
          <input type="date" id="profileDob" title="Date of birth" />
          <button class="save-profile-btn" id="saveProfileBtn" onclick="saveProfile()">Save Profile</button>
        </div>
      </div>
      <div class="status-msg" id="profileStatus"></div>
    </div>

    <!-- Kids panel -->
    <div class="panel">
      <p class="panel-title">👧 Your Kids</p>
      <div class="kid-list" id="kidList"></div>
      <div class="add-kid-form">
        <input type="text" id="kidName" placeholder="Child's first name" />
        <input type="number" id="kidAge" placeholder="Age" min="1" max="17" style="max-width:90px;" />
        <button class="add-kid-btn" onclick="addKid()">+ Add Kid</button>
      </div>
      <div class="status-msg" id="kidStatus"></div>
    </div>

    <!-- Pending approval -->
    <div class="panel">
      <p class="panel-title">⏳ Pending Your Approval</p>
      <div id="pendingList"><p class="empty">Loading...</p></div>
      <div class="status-msg" id="pendingStatus"></div>
    </div>

    <!-- Approved art -->
    <div class="panel">
      <p class="panel-title">✅ Live in the Shop</p>
      <div id="approvedList"><p class="empty">Loading...</p></div>
      <br/>
      <a href="platform-submit.html" class="submit-art-btn">🎨 Submit New Artwork</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://iwmviwhruzhwkokcjcnu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3bXZpd2hydXpod2tva2NqY251Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTE1MzYsImV4cCI6MjA5NjMyNzUzNn0.MtHOeTGyW5Q68HfYSJW7keNJGHpO5GCwJ2735ij_-JA';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'platform-login.html'; return; }
      currentUser = user;
      const name = user.user_metadata?.full_name || user.email;
      document.getElementById('userInfo').textContent = user.email;
      document.getElementById('welcome').textContent = `👋 Welcome back, ${name.split(' ')[0]}!`;
      loadProfile();
      loadKids();
      loadArtworks();
    }

    function loadProfile() {
      const meta = currentUser.user_metadata || {};
      document.getElementById('profileName').value = meta.full_name || '';
      document.getElementById('profileDob').value  = meta.date_of_birth || '';
      const avatar = meta.avatar_url || '';
      const img = document.getElementById('avatarImg');
      if (avatar) {
        img.src = avatar;
        img.style.fontSize = '0';
      } else {
        img.src = '';
        img.style.fontSize = '2.2rem';
        img.alt = '🧑';
      }
    }

    async function uploadAvatar(file) {
      if (!file) return;
      const st = document.getElementById('profileStatus');
      showStatus(st, 'loading' , '⏳ Uploading photo...');
      const ext = file.name.split('.').pop();
      const filename = `avatar-${currentUser.id}-${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage.from('avatars').upload(filename, file, { upsert: true, contentType: file.type });
      if (upErr) { showStatus(st, 'error', upErr.message); return; }
      const { data: urlData } = sb.storage.from('avatars').getPublicUrl(filename);
      const avatar_url = urlData.publicUrl;
      const { error } = await sb.auth.updateUser({ data: { ...currentUser.user_metadata, avatar_url } });
      if (error) { showStatus(st, 'error', error.message); return; }
      currentUser = (await sb.auth.getUser()).data.user;
      loadProfile();
      showStatus(st, 'success', '✅ Photo updated!');
    }

    async function saveProfile() {
      const name = document.getElementById('profileName').value.trim();
      const dob  = document.getElementById('profileDob').value;
      const btn  = document.getElementById('saveProfileBtn');
      const st   = document.getElementById('profileStatus');
      if (!name) { showStatus(st, 'error', 'Please enter your name.'); return; }
      btn.disabled = true;
      const { error } = await sb.auth.updateUser({ data: { ...currentUser.user_metadata, full_name: name, date_of_birth: dob } });
      if (error) { showStatus(st, 'error', error.message); }
      else {
        currentUser = (await sb.auth.getUser()).data.user;
        const firstName = name.split(' ')[0];
        document.getElementById('welcome').textContent = `👋 Welcome back, ${firstName}!`;
        showStatus(st, 'success', '✅ Profile saved!');
      }
      btn.disabled = false;
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'platform-login.html';
    }

    // ── Kids ──
    async function loadKids() {
      const { data } = await sb.from('kids').select('*').eq('parent_id', currentUser.id);
      const list = document.getElementById('kidList');
      if (!data || data.length === 0) { list.innerHTML = '<p style="color:#ccc;font-size:0.9rem;">No kids added yet.</p>'; return; }
      list.innerHTML = data.map(k => `
        <div class="kid-chip">
          🧒 ${k.name} (${k.age})
          <button onclick="deleteKid('${k.id}')">✕</button>
        </div>
      `).join('');
    }

    async function addKid() {
      const name = document.getElementById('kidName').value.trim();
      const age  = parseInt(document.getElementById('kidAge').value);
      const st   = document.getElementById('kidStatus');

      if (!name || !age) { showStatus(st,'error','Please enter name and age.'); return; }

      const { error } = await sb.from('kids').insert({ parent_id: currentUser.id, name, age });
      if (error) { showStatus(st,'error',error.message); return; }

      document.getElementById('kidName').value = '';
      document.getElementById('kidAge').value = '';
      showStatus(st,'success',`✅ ${name} added!`);
      loadKids();
    }

    async function deleteKid(id) {
      if (!confirm('Remove this kid?')) return;
      await sb.from('kids').delete().eq('id', id);
      loadKids();
    }

    // ── Artworks ──
    async function loadArtworks() {
      const { data } = await sb.from('artworks').select('*').eq('parent_id', currentUser.id).order('created_at', { ascending: false });

      const pending  = (data || []).filter(a => a.status === 'pending');
      const approved = (data || []).filter(a => a.status === 'approved');

      renderPending(pending);
      renderApproved(approved);
    }

    function renderPending(items) {
      const el = document.getElementById('pendingList');
      if (items.length === 0) { el.innerHTML = '<p class="empty">No artwork waiting for approval 🎉</p>'; return; }
      el.innerHTML = items.map(a => `
        <div class="pending-item">
          <img src="${a.image_url}" alt="${a.name}" />
          <div class="pending-info">
            <p class="pending-name">${a.name}</p>
            <p class="pending-meta">$${a.price} &nbsp;·&nbsp; Submitted ${new Date(a.created_at).toLocaleDateString()}</p>
            <div class="pending-actions">
              <button class="approve-btn" onclick="updateStatus('${a.id}','approved')">✅ Approve</button>
              <button class="reject-btn" onclick="updateStatus('${a.id}','rejected')">❌ Reject</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderApproved(items) {
      const el = document.getElementById('approvedList');
      if (items.length === 0) { el.innerHTML = '<p class="empty">No approved artworks yet</p>'; return; }
      el.innerHTML = items.map(a => `
        <div class="approved-item">
          <img src="${a.image_url}" alt="${a.name}" />
          <div class="approved-info">
            <p class="approved-name">${a.name}</p>
            <p class="approved-meta">$${a.price}</p>
          </div>
          <button class="remove-btn" onclick="updateStatus('${a.id}','rejected')">Remove</button>
        </div>
      `).join('');
    }

    async function updateStatus(id, status) {
      const st = document.getElementById('pendingStatus');
      const { error } = await sb.from('artworks').update({ status }).eq('id', id);
      if (error) { showStatus(st,'error',error.message); return; }
      loadArtworks();
    }

    function showStatus(el, type, msg) {
      el.className = 'status-msg ' + type;
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    init();
  </script>
</body>
</html>
